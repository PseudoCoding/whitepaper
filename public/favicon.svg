<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1d4ed8"/>
  <!-- Bot/AI face outline -->
  <rect x="8" y="10" width="16" height="13" rx="3" stroke="#ffffff" stroke-width="1.5" fill="none"/>
  <!-- Eyes -->
  <circle cx="12.5" cy="16" r="1.5" fill="#ffffff"/>
  <circle cx="19.5" cy="16" r="1.5" fill="#ffffff"/>
  <!-- Mouth / data bar -->
  <line x1="12" y1="19.5" x2="20" y2="19.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="16" y1="10" x2="16" y2="7" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="6" r="1" fill="#ffffff"/>
  <!-- Ear tabs -->
  <line x1="8" y1="15" x2="5.5" y2="15" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="15" x2="26.5" y2="15" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
